name: Bug Report
description: Report a bug in SF-Overlay2
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens (error message, screenshot, etc.)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 22.04, Windows 11, etc."
  - type: input
    id: docker
    attributes:
      label: Docker Version
      placeholder: "docker --version"
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker Compose
        - Portainer
        - Manual Docker
        - Other
  - type: input
    id: version
    attributes:
      label: sf-overlay2 Version
      placeholder: "tag or commit hash"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output of `docker logs sf-overlay2`
      render: shell