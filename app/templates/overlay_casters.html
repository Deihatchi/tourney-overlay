<!DOCTYPE html>
<html lang="{{ lang|default('fr') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Overlay — Casters</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: {{ primary|default("#ff4655") }};
    --secondary: {{ secondary|default("#00d4ff") }};
    --tertiary: {{ tertiary|default("#ffd700") }};
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: transparent !important;
    overflow: hidden;
    font-family: '{{ font|default("Rajdhani") }}', sans-serif;
    width: 1920px;
    height: 1080px;
}

/* ====== CASTERS CONTAINER ====== */
.casters-container {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    gap: 12px;
    z-index: 100;
    opacity: 1;
    transition: opacity 0.6s ease;
}

.casters-container.hidden {
    opacity: 0;
    pointer-events: none;
}

/* ====== CASTER CARD ====== */
.caster-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: rgba(10, 10, 20, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    min-width: 320px;
}

/* ------ AVATAR ------ */
.caster-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    overflow: hidden;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
}

.caster-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.caster-avatar .fallback {
    font-size: 18px;
    color: rgba(255,255,255,0.3);
}

/* ------ NAME ------ */
.caster-name {
    font-family: 'Orbitron', monospace;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
}

/* ------ SOCIAL ------ */
.caster-social {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
}

.caster-social .icon {
    font-size: 14px;
}

.caster-social .handle {
    color: var(--primary);
}

/* ====== EMPTY STATE ====== */
.empty-state {
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* ====== ANIMATION ====== */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.caster-card {
    animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* ====== VERSION BADGE ====== */
.corner-tag {
    position: absolute;
    top: 8px;
    left: 16px;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.12);
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 5;
    pointer-events: none;
}
</style>
</head>
<body>
<div class="corner-tag">CASTERS</div>

<div class="casters-container" id="castersContainer">
    <!-- Caster 1 -->
    <div class="caster-card" id="caster1Card">
        <div class="caster-avatar" id="caster1Avatar">
            <span class="fallback">?</span>
        </div>
        <div>
            <div class="caster-name" id="caster1Name">Caster 1</div>
            <div class="caster-social" id="caster1Social">
                <span class="icon">@handle</span>
            </div>
        </div>
    </div>
    
    <!-- Caster 2 -->
    <div class="caster-card" id="caster2Card">
        <div class="caster-avatar" id="caster2Avatar">
            <span class="fallback">?</span>
        </div>
        <div>
            <div class="caster-name" id="caster2Name">Caster 2</div>
            <div class="caster-social" id="caster2Social">
                <span class="icon">@handle</span>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var wsUrl = 'ws://' + window.location.host + '/ws/dashboard';
    var socket = null;
    var lang = '{{ lang|default("fr") }}';
    
    var i18n = {
        fr: {
            caster1: 'Caster 1',
            caster2: 'Caster 2',
            twitter: 'X',
            twitch: 'Twitch'
        },
        en: {
            caster1: 'Caster 1',
            caster2: 'Caster 2',
            twitter: 'X',
            twitch: 'Twitch'
        }
    };
    var _t = i18n[lang] || i18n.fr;
    
    function updateCaster(id, name, social, avatarUrl) {
        var nameEl = document.getElementById(id + 'Name');
        var socialEl = document.getElementById(id + 'Social');
        var avatarEl = document.getElementById(id + 'Avatar');
        
        if (nameEl) nameEl.textContent = name || (id === 'caster1' ? _t.caster1 : _t.caster2);
        if (socialEl) {
            socialEl.innerHTML = '';
            if (social) {
                var isTwitter = social.includes('twitter') || social.includes('x.com') || social.startsWith('@');
                var platform = isTwitter ? _t.twitter : _t.twitch;
                var display = social.startsWith('http') ? social.split('/').pop() : social;
                if (social.startsWith('@')) display = social;
                else if (social.includes('twitch.tv')) display = 'twitch.tv/' + social.split('twitch.tv/').pop();
                
                socialEl.innerHTML = '<span class="icon">' + platform + '</span><span class="handle">' + display + '</span>';
            } else {
                socialEl.innerHTML = '<span class="icon">@--</span>';
            }
        }
        if (avatarEl) {
            if (avatarUrl) {
                avatarEl.innerHTML = '<img src="' + avatarUrl + '" alt="">';
            } else {
                var initial = name ? name.charAt(0).toUpperCase() : '?';
                avatarEl.innerHTML = '<span class="fallback">' + initial + '</span>';
            }
        }
    }
    
    var _lastCasterSig = '';
    function loadCasters() {
        fetch('/api/casters')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var sig = [
                    data.caster1_name, data.caster1_social, data.caster1_avatar,
                    data.caster2_name, data.caster2_social, data.caster2_avatar,
                    data.display_duration
                ].join('|');
                // Only re-show / restart the hide timer when something actually changed.
                // Otherwise the 5s poll would keep resetting the timer and cards would never hide.
                if (sig === _lastCasterSig) return;
                _lastCasterSig = sig;
                if (data.caster1_name || data.caster1_social || data.caster1_avatar_url) updateCaster('caster1', data.caster1_name, data.caster1_social, data.caster1_avatar_url);
                if (data.caster2_name || data.caster2_social || data.caster2_avatar_url) updateCaster('caster2', data.caster2_name, data.caster2_social, data.caster2_avatar_url);
                scheduleHide(data.display_duration || 8);
            })
            .catch(function() {});
    }

    var _hideTimer = null;
    function scheduleHide(seconds) {
        var container = document.querySelector('.casters-container');
        if (!container) return;
        // show immediately
        container.classList.remove('hidden');
        if (_hideTimer) clearTimeout(_hideTimer);
        if (!seconds || seconds <= 0) return;  // 0 = stay visible
        _hideTimer = setTimeout(function() {
            container.classList.add('hidden');
        }, seconds * 1000);
    }
    
    loadCasters();
    
    // Poll for updates
    setInterval(loadCasters, 5000);
})();
</script>
</body>
</html>
