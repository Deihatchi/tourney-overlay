<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Overlay — Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
    --primary: {{ primary|default("#ff4655") }};
    --secondary: {{ secondary|default("#00d4ff") }};
    --tertiary: {{ tertiary|default("#ffd700") }};
    --duration: {{ notification_duration|default(8) }}s;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: transparent !important;
    overflow: hidden;
    font-family: {{ font_family|default("'Rajdhani', sans-serif") }};
    width: 1920px;
    height: 1080px;
}

/* ---- CONTAINER ---- */
#notif-container {
    position: absolute;
    {% if notification_position == "top-right" %}
        top: 30px; right: 30px;
    {% elif notification_position == "top-left" %}
        top: 30px; left: 30px;
    {% elif notification_position == "bottom-left" %}
        bottom: 220px; left: 30px;
    {% else %}
        bottom: 220px; right: 30px;
    {% endif %}
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 12px;
    pointer-events: none;
}

/* ---- TOAST ---- */
.toast {
    width: 400px;
    border-radius: 14px;
    overflow: hidden;
    transform: translateX(120%);
    opacity: 0;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    background: rgba(10, 10, 20, 0.88);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow:
        0 16px 48px rgba(0,0,0,0.6),
        0 0 30px color-mix(in srgb, var(--primary) 10%, transparent);
    position: relative;
    animation: {{ animation|default("slide") }} 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.toast.visible {
    transform: translateX(0);
    opacity: 1;
}

.toast.exiting {
    transform: translateX(120%);
    opacity: 0;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ---- TOP ACCENT STRIP ---- */
.toast-accent {
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    width: 100%;
}

.toast.ko .toast-accent {
    background: linear-gradient(90deg, var(--tertiary), var(--primary));
}

/* ---- INNER ---- */
.toast-inner {
    padding: 18px 20px;
}

.toast-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
}

.toast-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 60%, var(--secondary)));
    color: #fff;
    font-size: 16px;
    flex-shrink: 0;
}

.toast.ko .toast-icon {
    background: linear-gradient(135deg, var(--tertiary), var(--primary));
    font-weight: 900;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
}

.toast-title {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--primary);
}

.toast.ko .toast-title {
    color: var(--tertiary);
}

/* ---- BODY ---- */
.toast-body {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 20px;
    color: #fff;
    line-height: 1.35;
}

.toast-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    object-fit: cover;
    flex-shrink: 0;
}

.toast-avatar-ph {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
}

.toast-body .hl {
    color: var(--secondary);
    font-weight: 700;
}

.toast-body .hl-p2 {
    color: var(--primary);
    font-weight: 700;
}

/* ---- SCORE DISPLAY ---- */
.toast-score {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 0 4px;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 18px;
    color: var(--tertiary);
}

/* ---- TIME ---- */
.toast-time {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-top: 6px;
    letter-spacing: 1px;
    font-family: 'Inter', sans-serif;
}

/* ---- PROGRESS BAR ---- */
.toast-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    width: 100%;
    border-radius: 0 0 14px 14px;
    transition: width linear;
}

.toast.ko .toast-progress {
    background: linear-gradient(90deg, var(--tertiary), var(--primary));
}

/* ====== ENTRY ANIMATION KEYFRAMES ====== */
@keyframes slide {
    from { transform: translateX(120%); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
}

@keyframes fade {
    from { opacity: 0; }
    to   { opacity: 1; }
}

@keyframes zoom {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
}

@keyframes glitch {
    0%  { transform: translateX(120%) skewX(0deg); opacity: 0; }
    20% { transform: translateX(0) skewX(-8deg); opacity: 0.8; clip-path: inset(60% 0 0 0); }
    25% { transform: translateX(0) skewX(8deg); opacity: 0.9; clip-path: inset(30% 0 30% 0); }
    30% { transform: translateX(0) skewX(0deg); opacity: 1; clip-path: inset(0 0 0 0); }
    35% { clip-path: inset(0 0 60% 0); }
    40% { clip-path: inset(0 0 0 0); }
    100%{ transform: translateX(0) skewX(0deg); opacity: 1; }
}

@keyframes fire {
    0%  { transform: scale(0.9); opacity: 0; filter: blur(4px) brightness(0.5); }
    30% { opacity: 0.7; filter: blur(0) brightness(1.3); }
    60% { opacity: 1; filter: brightness(1); }
    100%{ transform: scale(1); opacity: 1; }
}

@keyframes pulse {
    0%  { transform: scale(0.95); opacity: 0; }
    20% { transform: scale(1.02); opacity: 1; }
    40% { transform: scale(0.98); }
    60% { transform: scale(1.01); }
    100%{ transform: scale(1); opacity: 1; }
}

@keyframes neon_sweep {
    0%  { opacity: 0; filter: brightness(3) hue-rotate(-30deg); }
    30% { opacity: 0.5; filter: brightness(1.5) hue-rotate(0deg); }
    70% { opacity: 1; filter: brightness(1.2); }
    100%{ opacity: 1; filter: brightness(1) hue-rotate(0deg); }
}

@keyframes matrix {
    0%  { opacity: 0; letter-spacing: 40px; }
    30% { opacity: 0.3; letter-spacing: 10px; }
    60% { opacity: 1; letter-spacing: 2px; }
    100%{ opacity: 1; letter-spacing: normal; }
}

@keyframes punch {
    0%  { transform: scale(1.3) rotate(-2deg); opacity: 0; }
    20% { transform: scale(0.9) rotate(1deg); opacity: 0.6; }
    50% { transform: scale(1.05); opacity: 1; }
    100%{ transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes swing {
    0%  { transform: rotate(-15deg) scale(0.7); opacity: 0; }
    30% { transform: rotate(5deg) scale(1.05); opacity: 0.7; }
    60% { transform: rotate(-2deg) scale(0.98); opacity: 1; }
    100%{ transform: rotate(0deg) scale(1); opacity: 1; }
}

@keyframes blast {
    0%  { transform: scale(0.3); opacity: 0; filter: brightness(3); }
    30% { transform: scale(1.15); opacity: 0.8; filter: brightness(1.5); }
    60% { transform: scale(0.95); filter: brightness(1); }
    100%{ transform: scale(1); opacity: 1; filter: brightness(1); }
}

@keyframes fatality {
    0%  { opacity: 0; filter: saturate(0) brightness(2); }
    25% { opacity: 0.5; filter: saturate(2) brightness(1.5); }
    50% { opacity: 1; filter: saturate(1.5); }
    100%{ opacity: 1; filter: saturate(1) brightness(1); }
}

@keyframes bounce {
    0%  { transform: translateY(-80px); opacity: 0; }
    50% { transform: translateY(15px); opacity: 1; }
    70% { transform: translateY(-8px); }
    85% { transform: translateY(3px); }
    100%{ transform: translateY(0); opacity: 1; }
}

@keyframes glow {
    0%  { opacity: 0; filter: brightness(0.3) drop-shadow(0 0 0 transparent); }
    40% { opacity: 0.7; filter: brightness(1.5) drop-shadow(0 0 20px var(--primary)); }
    100%{ opacity: 1; filter: brightness(1) drop-shadow(0 0 8px color-mix(in srgb, var(--primary) 30%, transparent)); }
}

@keyframes spin {
    0%  { transform: rotateY(90deg); opacity: 0; }
    60% { transform: rotateY(-10deg); opacity: 1; }
    80% { transform: rotateY(5deg); }
    100%{ transform: rotateY(0deg); opacity: 1; }
}

/* VERSION BADGE */
.version-badge {
    position: fixed;
    bottom: 12px;
    right: 12px;
    background: rgba(10, 10, 25, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.4);
    z-index: 1000;
    pointer-events: none;
}
</style>
</head>
<body>
<div id="notif-container"></div>
<div class="version-badge">v{{ version }}</div>

<script>
(function() {
    var wsUrl = 'ws://' + window.location.host + '/ws/dashboard';
    var socket = null;
    var DURATION = {{ notification_duration|default(8) }} * 1000;
    var lang = '{{ lang|default("fr") }}';

    var i18n = {
        fr: { match_completed: 'MATCH TERMINÉ', score_update: 'SCORE MIS À JOUR' },
        en: { match_completed: 'MATCH COMPLETE', score_update: 'SCORE UPDATE' }
    };
    var _t = i18n[lang] || i18n.fr;

    function connectWs() {
        socket = new WebSocket(wsUrl);
        socket.onopen = function() { console.log('WS notif connecté'); };
        socket.onmessage = function(e) {
            try {
                var data = JSON.parse(e.data);
                if (data.type === 'match_completed' || (data.match && data.match.state === 'complete')) {
                    showToast(data);
                }
            } catch(err) {}
        };
        socket.onclose = function() {
            setTimeout(function() { connectWs(); }, 3000);
        };
    }

    connectWs();

    setInterval(function() {
        if (socket && socket.readyState === 1) socket.send('ping');
    }, 30000);

    function showToast(data) {
        var container = document.getElementById('notif-container');
        var toast = document.createElement('div');
        toast.className = 'toast';

        var match = data.match || {};
        var p1 = (match.player1 && match.player1.name) || '???';
        var p2 = (match.player2 && match.player2.name) || '???';
        var s1 = (match.player1 && match.player1.score != null) ? match.player1.score : '-';
        var s2 = (match.player2 && match.player2.score != null) ? match.player2.score : '-';
        var isKO = match.state === 'complete';

        if (isKO) toast.classList.add('ko');

        var iconContent = isKO ? 'KO' : '⚡';
        var titleContent = isKO ? _t.match_completed : _t.score_update;

        toast.innerHTML =
            '<div class="toast-accent"></div>' +
            '<div class="toast-inner">' +
                '<div class="toast-header">' +
                    '<div class="toast-icon">' + iconContent + '</div>' +
                    '<div class="toast-title">' + titleContent + '</div>' +
                '</div>' +
                '<div class="toast-body" style="display:flex;align-items:center;gap:10px">' +
                    (match.player1 && match.player1.avatar_url
                        ? '<img src="' + match.player1.avatar_url + '" class="toast-avatar">'
                        : '<div class="toast-avatar-ph"></div>') +
                    '<span class="hl">' + p1 + '</span>' +
                    '<span class="toast-score">' + s1 + '–' + s2 + '</span>' +
                    '<span class="hl-p2">' + p2 + '</span>' +
                    (match.player2 && match.player2.avatar_url
                        ? '<img src="' + match.player2.avatar_url + '" class="toast-avatar">'
                        : '<div class="toast-avatar-ph"></div>') +
                '</div>' +
                '<div class="toast-time">' + new Date().toLocaleTimeString() + '</div>' +
            '</div>' +
            '<div class="toast-progress" style="width:100%"></div>';

        container.appendChild(toast);

        // Animate in
        requestAnimationFrame(function() {
            toast.classList.add('visible');
        });

        // Progress bar countdown
        var bar = toast.querySelector('.toast-progress');
        requestAnimationFrame(function() {
            bar.style.transition = 'width ' + DURATION + 'ms linear';
            bar.style.width = '0%';
        });

        // Auto-remove after duration
        setTimeout(function() {
            toast.classList.remove('visible');
            toast.classList.add('exiting');
            setTimeout(function() { toast.remove(); }, 600);
        }, DURATION);
    }
})();
</script>
</body>
</html>
